name: Task
description: A unit of work on Defiant
title: "[task] "
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to happen, and any context that helps when picking it up later
    validations:
      required: true

  - type: input
    id: parts
    attributes:
      label: Parts needed (link or list)
      description: If parts are pending, also add the `blocked:parts` label after creation
      placeholder: e.g. Harken cheek block, 3/8" lugs x4

  - type: textarea
    id: knowledge
    attributes:
      label: Knowledge captured
      description: Measurements, part numbers, photos, gotchas. This feeds the wiki when the issue closes.
      placeholder: |
        Measurements:
        Part numbers:
        Wiki page:
