name: triage-deps

on:
  schedule:
    # 8am, 1pm, 6pm America/New_York (EDT). Cron is UTC.
    # During EST (Nov–Mar) these run at 7am, 12pm, 5pm local — adjust then if needed.
    - cron: "0 12,17,22 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run even if no recent inbound mail"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for fresh inbound mail
        id: check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          SINCE=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(aws s3api list-objects-v2 \
            --bucket svdefiant-inbound-mail \
            --prefix inbound/ \
            --query "Contents[?LastModified > '${SINCE}' && Key != 'inbound/AMAZON_SES_SETUP_NOTIFICATION']" \
            --output json | jq 'length')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Fresh inbound emails (last 24h): ${COUNT}"
          if [ "${COUNT}" = "0" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "::notice::No new inbound mail — skipping triage."
          fi

      - if: steps.check.outputs.count != '0' || inputs.force == true
        uses: astral-sh/setup-uv@v5

      - if: steps.check.outputs.count != '0' || inputs.force == true
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - if: steps.check.outputs.count != '0' || inputs.force == true
        name: Install anthropic SDK
        run: pip install anthropic

      - if: steps.check.outputs.count != '0' || inputs.force == true
        name: Run triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python .github/scripts/triage-deps.py >> "$GITHUB_STEP_SUMMARY"
