name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # `workflow_run` is the documented escape hatch from the recursion guard
  # that suppresses `push` events from commits authored with GITHUB_TOKEN.
  # The daily planner-refresh job pushes a JSON update with that token, so
  # we re-trigger Hugo here when it completes successfully.
  workflow_run:
    workflows: ["planner-refresh"]
    types: [completed]
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    # When triggered by workflow_run, only build if the upstream succeeded.
    # Other triggers (push, workflow_dispatch) always proceed.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.1'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3.0.0
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
